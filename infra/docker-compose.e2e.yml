# UC-001 E2E stack — Postgres + biometric gRPC + attendance HTTP.
#
# Usage:
#   docker compose -f infra/docker-compose.e2e.yml up -d --wait
#   ./scripts/verify-uc001-e2e.sh --curl
#   docker compose -f infra/docker-compose.e2e.yml down
#
# First biometric/attendance start compiles sources inside the container (slow).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openpresence
      POSTGRES_PASSWORD: openpresence
      POSTGRES_DB: openpresence
    ports:
      - "5433:5432"
    volumes:
      - ../services/attendance/migrations:/migrations:ro
      - ./e2e/init-postgres.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpresence -d openpresence"]
      interval: 2s
      timeout: 5s
      retries: 15

  biometric:
    image: rust:1-bookworm
    working_dir: /app
    volumes:
      - ../services/biometric:/app
    environment:
      BIOMETRIC_USE_STUB: "true"
      BIOMETRIC_GRPC_ADDR: "0.0.0.0:9090"
      BIOMETRIC_HTTP_ADDR: "0.0.0.0:9091"
      RUST_LOG: warn
    command: ["bash", "-c", "cargo run --quiet --bin biometric-server"]
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy

  attendance:
    image: golang:1.25-bookworm
    working_dir: /app
    volumes:
      - ../services/attendance:/app
    environment:
      DATABASE_URL: postgres://attendance_app:attendance_app@postgres:5432/openpresence?sslmode=disable
      BIOMETRIC_GRPC_ADDR: biometric:9090
      ATTENDANCE_HTTP_ADDR: ":8080"
    command: ["go", "run", "./cmd/attendance-server"]
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy
      biometric:
        condition: service_started
